name: Cypress CI

on:
  push:
    branches: [main]
    paths:
      - 'cypress/**'
      - '.github/workflows/cypress-ci.yml'
  pull_request:
    paths:
      - 'cypress/**'
      - '.github/workflows/cypress-ci.yml'
  schedule:
    - cron: '0 6 * * *' # Daily 06:00 UTC — flakiness baseline
  workflow_dispatch:

concurrency:
  group: cypress-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CONDUIT_BASE_URL: http://localhost:3000
  CONDUIT_API_URL: http://localhost:3000/api

jobs:
  cypress:
    name: Cypress E2E — Conduit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
