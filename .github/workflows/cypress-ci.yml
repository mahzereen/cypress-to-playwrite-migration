          echo "TODO: run seed script — create test users and articles"

      - name: Health check — Conduit API
        run: |
          echo "TODO: curl -f ${CONDUIT_API_URL}/tags"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cypress/package-lock.json

      - name: Install Cypress dependencies
        working-directory: cypress
        run: |
          echo "TODO: npm ci"
          echo "TODO: npx cypress install"

      - name: Run Cypress tests
        working-directory: cypress
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          echo "TODO: npm test"

      - name: Generate Allure report
        if: always()
        working-directory: cypress
        run: |
          echo "TODO: allure generate reports/allure-results -o reports/allure-report"

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-allure-results
          path: cypress/reports/allure-results/
