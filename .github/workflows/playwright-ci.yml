          echo "TODO: curl -f ${CONDUIT_API_URL}/tags"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - name: Install Playwright dependencies
        working-directory: playwright
        run: |
          echo "TODO: npm ci"
          echo "TODO: npx playwright install --with-deps chromium"

