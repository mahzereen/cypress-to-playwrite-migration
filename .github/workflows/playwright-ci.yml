name: Playwright CI

on:
  push:
    branches: [main]
    paths:
      - 'playwright/**'
      - 'infra/**'
      - '.env.example'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/playwright-ci.yml'
      - '.github/actions/setup-conduit/**'
  pull_request:
    paths:
      - 'playwright/**'
      - 'infra/**'
      - '.env.example'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/playwright-ci.yml'
      - '.github/actions/setup-conduit/**'
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: playwright-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: http://localhost:3000
  CONDUIT_API_URL: http://localhost:3001/api
  TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'test@example.com' }}
  TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'TestPassword123' }}

jobs:
  playwright:
    name: Playwright E2E — Conduit
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            playwright/package-lock.json

      - name: Start and seed Conduit
        uses: ./.github/actions/setup-conduit
        with:
          test_user_email: ${{ env.TEST_USER_EMAIL }}
          test_user_password: ${{ env.TEST_USER_PASSWORD }}

      - name: Install Playwright dependencies
        working-directory: playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Clean prior Allure results
        run: rm -rf playwright/reports/allure-results && mkdir -p playwright/reports/allure-results

      - name: Run Playwright tests
        id: playwright-test
        working-directory: playwright
        env:
          BASE_URL: ${{ env.BASE_URL }}
          CONDUIT_API_URL: ${{ env.CONDUIT_API_URL }}
          TEST_USER_EMAIL: ${{ env.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ env.TEST_USER_PASSWORD }}
        run: |
          start=$(date +%s%3N)
          npx playwright test --retries=0
          exit_code=$?
          end=$(date +%s%3N)
          echo "duration_ms=$((end - start))" >> "$GITHUB_OUTPUT"
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit "${exit_code}"

      - name: Setup Java (Allure)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate Allure report
        if: always()
        working-directory: playwright
        run: npm run report:generate

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-allure-results
          path: playwright/reports/allure-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-allure-report
          path: playwright/reports/allure-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: playwright/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop Conduit
        if: always()
        run: npm run app:down
