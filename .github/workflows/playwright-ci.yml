name: Playwright CI

on:
  push:
    branches: [main]
    paths:
      - 'playwright/**'
      - '.github/workflows/playwright-ci.yml'
  pull_request:
    paths:
      - 'playwright/**'
      - '.github/workflows/playwright-ci.yml'
  schedule:
    - cron: '0 7 * * *' # Daily 07:00 UTC — offset from Cypress for resource isolation
  workflow_dispatch:

concurrency:
  group: playwright-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CONDUIT_BASE_URL: http://localhost:3000
  CONDUIT_API_URL: http://localhost:3000/api

jobs:
