name: Migration Metrics

on:
  push:
    branches: [main]
    paths:
      - 'cypress/**'
      - 'playwright/**'
      - 'migration/**'
      - 'infra/**'
      - 'scripts/ci/**'
      - '.env.example'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/migration-metrics.yml'
      - '.github/actions/setup-conduit/**'
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: migration-metrics
  cancel-in-progress: false

env:
  BASE_URL: http://localhost:3000
  CONDUIT_API_URL: http://localhost:3001/api
  TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'test@example.com' }}
  TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'TestPassword123' }}

jobs:
  collect-metrics:
    name: Aggregate Migration Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            cypress/package-lock.json
            playwright/package-lock.json

      - name: Start and seed Conduit
        uses: ./.github/actions/setup-conduit
        with:
          test_user_email: ${{ env.TEST_USER_EMAIL }}
          test_user_password: ${{ env.TEST_USER_PASSWORD }}

      - name: Install Cypress dependencies
        working-directory: cypress
        run: |
          npm ci
          npx cypress install

      - name: Install Playwright dependencies
        working-directory: playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Clean prior Allure results
        run: |
          rm -rf cypress/reports/allure-results playwright/reports/allure-results
          mkdir -p cypress/reports/allure-results playwright/reports/allure-results

      - name: Run Cypress suite (metrics pass)
        id: cypress
        working-directory: cypress
        env:
          BASE_URL: ${{ env.BASE_URL }}
          CONDUIT_API_URL: ${{ env.CONDUIT_API_URL }}
          TEST_USER_EMAIL: ${{ env.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ env.TEST_USER_PASSWORD }}
        run: |
          start=$(date +%s%3N)
          npx cypress run --config retries=0
          code=$?
          end=$(date +%s%3N)
          echo "duration_ms=$((end - start))" >> "$GITHUB_OUTPUT"
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit "${code}"
        continue-on-error: true

      - name: Run Playwright suite (metrics pass)
        id: playwright
        working-directory: playwright
        env:
          BASE_URL: ${{ env.BASE_URL }}
          CONDUIT_API_URL: ${{ env.CONDUIT_API_URL }}
          TEST_USER_EMAIL: ${{ env.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ env.TEST_USER_PASSWORD }}
        run: |
          start=$(date +%s%3N)
          npx playwright test --retries=0
          code=$?
          end=$(date +%s%3N)
          echo "duration_ms=$((end - start))" >> "$GITHUB_OUTPUT"
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit "${code}"
        continue-on-error: true

      - name: Generate comparison metrics
        env:
          CYPRESS_EXIT_CODE: ${{ steps.cypress.outputs.exit_code }}
          CYPRESS_DURATION_MS: ${{ steps.cypress.outputs.duration_ms }}
          PLAYWRIGHT_EXIT_CODE: ${{ steps.playwright.outputs.exit_code }}
          PLAYWRIGHT_DURATION_MS: ${{ steps.playwright.outputs.duration_ms }}
        run: node scripts/ci/write-metrics.mjs

      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-metrics
          path: migration/metrics/metrics.json
          retention-days: 90
          if-no-files-found: warn

      - name: Upload combined Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combined-allure-results
          path: |
            cypress/reports/allure-results/
            playwright/reports/allure-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Fail if either suite failed
        if: steps.cypress.outputs.exit_code != '0' || steps.playwright.outputs.exit_code != '0'
        run: |
          echo "Cypress exit: ${{ steps.cypress.outputs.exit_code }}"
          echo "Playwright exit: ${{ steps.playwright.outputs.exit_code }}"
          exit 1

      - name: Stop Conduit
        if: always()
        run: npm run app:down
