name: Publish Allure

on:
  push:
    branches: [main]
    paths:
      - 'cypress/**'
      - 'playwright/**'
      - 'infra/**'
      - '.env.example'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/publish-allure.yml'
      - '.github/actions/setup-conduit/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-allure
  cancel-in-progress: true

env:
  BASE_URL: http://localhost:3000
  CONDUIT_API_URL: http://localhost:3001/api
  TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'test@example.com' }}
  TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'TestPassword123' }}

jobs:
  build:
    name: Cypress + Playwright → Allure
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            cypress/package-lock.json
            playwright/package-lock.json

      - name: Start and seed Conduit
        uses: ./.github/actions/setup-conduit
        with:
          test_user_email: ${{ env.TEST_USER_EMAIL }}
          test_user_password: ${{ env.TEST_USER_PASSWORD }}

      - name: Install Cypress dependencies
        working-directory: cypress
        run: |
          npm ci
          npx cypress install

      - name: Install Playwright dependencies
        working-directory: playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Clean prior Allure results
        run: |
          rm -rf cypress/reports/allure-results playwright/reports/allure-results migration/allure-report
          mkdir -p cypress/reports/allure-results playwright/reports/allure-results

      - name: Run Cypress suite
        working-directory: cypress
        env:
          BASE_URL: ${{ env.BASE_URL }}
          CONDUIT_API_URL: ${{ env.CONDUIT_API_URL }}
          TEST_USER_EMAIL: ${{ env.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ env.TEST_USER_PASSWORD }}
        run: npx cypress run --config retries=0

      - name: Run Playwright suite
        working-directory: playwright
        env:
          BASE_URL: ${{ env.BASE_URL }}
          CONDUIT_API_URL: ${{ env.CONDUIT_API_URL }}
          TEST_USER_EMAIL: ${{ env.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ env.TEST_USER_PASSWORD }}
        run: npx playwright test --retries=0

      - name: Setup Java (Allure requirement)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate combined Allure report
        if: always()
        run: |
          npx --prefix cypress allure generate \
            cypress/reports/allure-results \
            playwright/reports/allure-results \
            --clean \
            -o migration/allure-report

      - name: Upload Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combined-allure-results
          path: |
            cypress/reports/allure-results/
            playwright/reports/allure-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Allure HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combined-allure-report
          path: migration/allure-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Stop Conduit
        if: always()
        run: npm run app:down

  deploy:
    name: Deploy Allure → GitHub Pages
    needs: build
    if: always() && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Allure HTML report
        uses: actions/download-artifact@v4
        with:
          name: combined-allure-report
          path: migration/allure-report

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      # Re-runs attach extra "github-pages" artifacts to the same run_id;
      # deploy-pages requires exactly one. See actions/upload-pages-artifact#97.
      - name: Delete stale github-pages artifacts from prior attempts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: github-pages
          failOnError: false

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: migration/allure-report/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report dashboard URL
        run: echo "Allure dashboard → ${{ steps.deployment.outputs.page_url }}"
