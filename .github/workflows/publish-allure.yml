name: Publish Allure

on:
  push:
    branches: [main]
    paths:
      - 'cypress/**'
      - 'infra/**'
      - 'app-under-test/**'
      - '.github/workflows/publish-allure.yml'
      - '.env.example'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish-allure
  cancel-in-progress: true

env:
  BASE_URL: http://localhost:3000
  CONDUIT_API_URL: http://localhost:3001/api

jobs:
  cypress-allure-pages:
    name: Cypress → Allure → GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cypress/package-lock.json

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Start Conduit locally
        run: npm run app:up

      - name: Seed Conduit test data
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'test@example.com' }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'TestPassword123' }}
        run: npm run app:seed

      - name: Install Cypress dependencies
        working-directory: cypress
        run: |
          npm ci
          npx cypress install

      - name: Run Cypress suite
        working-directory: cypress
        env:
          BASE_URL: ${{ env.BASE_URL }}
          CONDUIT_API_URL: ${{ env.CONDUIT_API_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'test@example.com' }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'TestPassword123' }}
        run: npm test

      - name: Setup Java (Allure requirement)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate Allure report
        if: always()
        working-directory: cypress
        run: npm run report:generate

      - name: Upload Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-allure-results
          path: cypress/reports/allure-results/
          retention-days: 30

      - name: Upload Allure HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-allure-report
          path: cypress/reports/allure-report/
          retention-days: 30

      - name: Setup GitHub Pages
        if: always()
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: cypress/reports/allure-report/

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report dashboard URL
        if: always()
        run: |
          echo "Allure dashboard: ${{ steps.deployment.outputs.page_url }}"
